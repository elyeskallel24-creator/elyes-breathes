<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>elyes breathes</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <div class="ocean-bg">
        <div class="wave"></div>
        <div class="wave"></div>
    </div>

    <div class="app-container">
        <h1 class="app-title">elyes breathes</h1>
        
        <div class="circle-container">
            <div class="breathing-circle" id="breathCircle"></div>
            <div class="status-text" id="statusText">Tap to Start</div>
            <div class="timer-text" id="timerText">00</div>
        </div>

        <div class="controls">
            <button id="startBtn" class="btn">Begin</button>
            
            <div class="settings-panel">
                ### Customize Durations (Seconds)
                <div class="input-group">
                    <label>Inhale 1:</label>
                    <input type="number" id="inhale1Time" value="4" min="1">
                </div>
                <div class="input-group">
                    <label>Exhale 1:</label>
                    <input type="number" id="exhale1Time" value="4" min="1">
                </div>
                <div class="input-group">
                    <label>Inhale 2:</label>
                    <input type="number" id="inhale2Time" value="4" min="1">
                </div>
                <div class="input-group">
                    <label>Exhale 2:</label>
                    <input type="number" id="exhale2Time" value="4" min="1">
                </div>
            </div>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
